<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃園國際民俗舞社例會舞碼</title>
    <style>
        :root {
            --primary-color: #0066cc;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #666666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* 固定頂部標題與篩選器 */
        header {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 15px 10px;
            z-index: 1000;
            border-bottom: 2px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.4em;
            color: var(--text-main);
        }

        .filter-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            font-size: 1em;
            outline: none;
            cursor: pointer;
        }

        /* 舞碼清單容器 */
        #content {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 舞碼單元格 */
        .item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .item:active {
            transform: scale(0.98);
        }

        .item-date {
            font-size: 0.85em;
            color: var(--text-sub);
            margin-bottom: 5px;
            display: block;
        }

        .item-title {
            margin: 5px 0;
            font-size: 1.25em;
            color: var(--primary-color);
        }

        .item-info {
            margin: 5px 0;
            font-size: 0.95em;
        }

        .item-info b {
            color: #444;
        }

        /* 連結按鈕 */
        .links-container {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .video-link {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 10px;
            background: #eef6ff;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid #d0e3ff;
        }

        .video-link:hover {
            background: var(--primary-color);
            color: white;
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">桃園國際民俗舞社</h1>
    <div class="filter-section">
        <label for="date-filter"><b>🗓️ 選擇例會：</b></label>
        <select id="date-filter">
            <option value="all">全部日期</option>
        </select>
    </div>
</header>

<div id="content">
    <p class="no-data">資料載入中...</p>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vToq63ov94zuD2bBr2rSAymP934KIQA5I6i52AUQszCL3csyaWye2easCKplQzGKVlwSfV_J9VHeSpm/pub?output=csv";

    const contentDiv = document.getElementById("content");
    const dateFilter = document.getElementById("date-filter");

    let allData = [];

    // 1. 抓取 CSV 資料
    fetch(CSV_URL + "&t=" + new Date().getTime())
        .then(res => res.text())
        .then(csv => {
            const rows = csv.split(/\r?\n/);
            const thursdays = new Set();

            allData = rows.slice(1).map(row => {
                // 處理包含引號與逗號的複雜 CSV 格式
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                if (cols.length < 5) return null;

                const clean = (val) => val ? val.replace(/"/g, "").trim() : "";

                const item = {
                    name: clean(cols[0]),
                    date: clean(cols[2]),       // C欄: 日期
                    seq: clean(cols[3]),        // D欄: 排序
                    country: clean(cols[4]),    // E欄: 國家/出處
                    type: clean(cols[5]),       // F欄: 形式
                    difficulty: clean(cols[6]), // G欄: 難度
                    link1: clean(cols[7]),      // H欄: 影片1
                    link2: clean(cols[8])       // I欄: 影片2
                };

                // 只加入有效的週四日期 (getDay === 4)
                if (item.date && item.date !== "#N/A" && item.seq !== "#N/A") {
                    const d = new Date(item.date);
                    if (!isNaN(d.getTime()) && d.getDay() === 4) {
                        thursdays.add(item.date);
                    }
                    return item;
                }
                return null;
            }).filter(item => item !== null);

            // 2. 更新下拉選單 (由新到舊排序)
            const sortedDates = Array.from(thursdays).sort().reverse();
            
            // 決定預設日期：選取最新的一個週四
            const defaultDate = sortedDates.length > 0 ? sortedDates[0] : "all";

            sortedDates.forEach(date => {
                const option = document.createElement("option");
                option.value = date;
                option.textContent = date + " (週四)";
                dateFilter.appendChild(option);
            });

            // 3. 設定預設值並顯示
            dateFilter.value = defaultDate;
            renderData(defaultDate);
        })
        .catch(err => {
            console.error(err);
            contentDiv.innerHTML = `<div class="no-data">載入失敗，請確認試算表已發佈為 CSV。</div>`;
        });

    // 渲染函數
    function renderData(selectedDate) {
        contentDiv.innerHTML = "";
        
        const filtered = allData.filter(item => {
            return selectedDate === "all" || item.date === selectedDate;
        });

        if (filtered.length === 0) {
            contentDiv.innerHTML = `<div class="no-data">目前沒有 ${selectedDate} 的舞碼資料。</div>`;
            return;
        }

        filtered.forEach(item => {
            const v1 = (item.link1 && item.link1.startsWith('http')) ? `<a href="${item.link1}" target="_blank" class="video-link">🎬 影片連結 1</a>` : "";
            const v2 = (item.link2 && item.link2.startsWith('http')) ? `<a href="${item.link2}" target="_blank" class="video-link">🎬 影片連結 2</a>` : "";

            contentDiv.innerHTML += `
                <div class="item">
                    <span class="item-date">📅 ${item.date} 週四例會</span>
                    <h2 class="item-title">${item.seq}. ${item.name}</h2>
                    <p class="item-info"><b>🌍 國家/出處：</b>${item.country}</p>
                    <p class="item-info"><b>💃 形式：</b>${item.type} (難度: ${item.difficulty})</p>
                    <div class="links-container">${v1} ${v2}</div>
                </div>
            `;
        });
        
        // 渲染後滾動回頂部
        window.scrollTo(0, 0);
    }

    // 監聽切換
    dateFilter.addEventListener("change", (e) => {
        renderData(e.target.value);
    });
</script>

</body>
</html>
