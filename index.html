<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 加入此 meta 標籤以確保響應式設計在手機上正常運作 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃園國際民俗舞社例會舞碼</title> <!-- 初始標題，將被 J2 內容覆蓋 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px; /* 減少 padding 增加手機可用空間 */
            background: #f5f5f5;
            margin: 0;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px; /* 調整標題下邊距 */
            font-size: 1.5em; /* 調整標題字體大小以適應手機 */
        }
        .item {
            background: white;
            border-radius: 8px; /* 調整圓角 */
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .links-container {
            margin-top: 10px;
        }
        .video-link {
            display: block; /* 讓連結垂直排列 */
            margin-bottom: 5px;
            color: #0066cc;
            text-decoration: none;
            word-wrap: break-word; /* 防止長連結撐開佈局 */
        }
        .video-link:hover {
            text-decoration: underline;
        }

        /* 媒體查詢：針對大螢幕設備調整佈局 (可選) */
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
            .item {
                padding: 20px;
            }
        }

    /* 固定頂部標題（從 J2 載入） */
    #main-title {
        position: sticky;
        top: 0;
        background: #f5f5f5;
        padding: 10px;
        z-index: 999;
        border-bottom: 2px solid #ccc;
    }

    </style>
</head>
<body>

<!-- 給 H1 一個 ID，方便 JavaScript 存取 -->
<h1 id="main-title">資料載入中...</h1>

<div id="content"></div>

<script>
    // 正確的 CSV 來源網址
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOwHBP78DwxOPtg2vmWgigogQ_-42MeNBA5e8CtPPf8pD31-zdo2ZU9a_h11CShTCn_x5piqWrpl1X/pub?gid=0&single=true&output=csv";

    const contentDiv = document.getElementById("content");
    const titleH1 = document.getElementById("main-title");

    // 🔸 正確取得 J2
    // Google Sheet 支援使用 &range=J2 來指定儲存格
    const J2_URL = CSV_URL + "&range=J2";

    // 1. 取得 J2 標題
    fetch(J2_URL)
        .then(res => res.text())
        .then(titleText => {
            titleH1.textContent = titleText.trim() || "舞碼列表";
        })
        .catch(err => {
            console.error("無法載入標題:", err);
            titleH1.textContent = "舞碼列表載入失敗";
        });

    // 2. 載入舞碼列表
    fetch(CSV_URL + "&t=" + new Date().getTime())
        .then(res => res.text())
        .then(csv => {
            const rows = csv.split("\n");
            contentDiv.innerHTML = "";

            rows.slice(1, 41).forEach(row => {
                const cols = row.split(",");

                const seq = cols[1];
                const name = cols[2];
                const country = cols[3];
                const type = cols[4];
                const difficulty = cols[7];
                const link1 = cols[5];
                const link2 = cols[6];

                const videoLink1HTML = link1 ? `<a href="${link1.trim()}" target="_blank" class="video-link">影片連結 1</a>` : "";
                const videoLink2HTML = link2 ? `<a href="${link2.trim()}" target="_blank" class="video-link">影片連結 2</a>` : "";

                if (seq && name) {
                    contentDiv.innerHTML += `
                        <div class="item">
                            <h2>${seq.trim()} - ${name.trim()}</h2>
                            <p><b>國家/編舞老師：</b>${country.trim()}</p>
                            <p><b>舞蹈類型：</b>${type.trim()}</p>
                            <p><b>難度：</b>${type.trim()}</p>
                            <div class="links-container">
                                ${videoLink1HTML}
                                ${videoLink2HTML}
                            </div>
                        </div>
                    `;
                }
            });
        })
        .catch(err => {
            console.error("無法載入資料:", err);
            contentDiv.innerHTML = "<p>載入資料時發生錯誤。</p>";
        });

</script>

</body>
</html>
