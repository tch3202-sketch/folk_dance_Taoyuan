<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 加入此 meta 標籤以確保響應式設計在手機上正常運作 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桃園國際民俗舞社例會舞碼</title> <!-- 初始標題，將被 J2 內容覆蓋 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px; /* 減少 padding 增加手機可用空間 */
            background: #f5f5f5;
            margin: 0;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px; /* 調整標題下邊距 */
            font-size: 1.5em; /* 調整標題字體大小以適應手機 */
        }
        .item {
            background: white;
            border-radius: 8px; /* 調整圓角 */
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .links-container {
            margin-top: 10px;
        }
        .video-link {
            display: block; /* 讓連結垂直排列 */
            margin-bottom: 5px;
            color: #0066cc;
            text-decoration: none;
            word-wrap: break-word; /* 防止長連結撐開佈局 */
        }
        .video-link:hover {
            text-decoration: underline;
        }

        /* 媒體查詢：針對大螢幕設備調整佈局 (可選) */
        @media (min-width: 600px) {
            body {
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
            .item {
                padding: 20px;
            }
        }

    /* 固定頂部標題（從 J2 載入） */
    #main-title {
        position: sticky;
        top: 0;
        background: #f5f5f5;
        padding: 10px;
        z-index: 999;
        border-bottom: 2px solid #ccc;
    }

    </style>
</head>
<body>

<!-- 給 H1 一個 ID，方便 JavaScript 存取 -->
<h1 id="main-title">資料載入中...</h1>

<div id="content"></div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vToq63ov94zuD2bBr2rSAymP934KIQA5I6i52AUQszCL3csyaWye2easCKplQzGKVlwSfV_J9VHeSpm/pub?output=csv";

    const contentDiv = document.getElementById("content");
    const titleH1 = document.getElementById("main-title");

    // 一次性抓取所有資料
    fetch(CSV_URL + "&t=" + new Date().getTime())
        .then(res => res.text())
        .then(csv => {
            // 使用簡單正則處理包含逗號的儲存格
            const rows = csv.split(/\r?\n/).map(row => {
                return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            });

            // 假設 J2 的內容在 CSV 的第 2 列（Index 1），第 10 欄（Index 9）
            // 視你的試算表結構調整座標
            if (rows[1] && rows[1][9]) {
                titleH1.textContent = rows[1][9].replace(/"/g, "");
            } else {
                titleH1.textContent = "桃園國際民俗舞社例會舞碼";
            }

            contentDiv.innerHTML = "";

            // 處理舞碼列表（從第 2 列開始，取前 40 筆）
            rows.slice(1, 41).forEach(cols => {
                if (cols.length < 5) return; // 跳過空行

                const name = cols[0]?.replace(/"/g, "");
                const seq = cols[3]?.replace(/"/g, "");
                const country = cols[4]?.replace(/"/g, "");
                const type = cols[5]?.replace(/"/g, "");
                const difficulty = cols[6]?.replace(/"/g, "");
                const link1 = cols[7]?.replace(/"/g, "");
                const link2 = cols[8]?.replace(/"/g, "");

                if (seq && name) {
                    const videoLink1HTML = link1 ? `<a href="${link1.trim()}" target="_blank" class="video-link">🎥 影片連結 1</a>` : "";
                    const videoLink2HTML = link2 ? `<a href="${link2.trim()}" target="_blank" class="video-link">🎥 影片連結 2</a>` : "";

                    contentDiv.innerHTML += `
                        <div class="item">
                            <h2 style="color: #2c3e50; font-size: 1.2em;">${seq} - ${name}</h2>
                            <p><b>🌍 國家/編舞：</b>${country}</p>
                            <p><b>💃 舞蹈類型：</b>${type}</p>
                            <p><b>📊 難度：</b>${difficulty}</p>
                            <div class="links-container">
                                ${videoLink1HTML}
                                ${videoLink2HTML}
                            </div>
                        </div>
                    `;
                }
            });
        })
        .catch(err => {
            console.error("資料載入失敗:", err);
            titleH1.textContent = "載入失敗";
            contentDiv.innerHTML = "<p>請檢查網路連線或試算表發佈設定。</p>";
        });
</script>

</body>
</html>
